apiVersion: apps/v1
kind: Deployment
metadata:
  name: afp-policy-operator
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-fabric
      app.kubernetes.io/component: policy-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-fabric
        app.kubernetes.io/component: policy-operator
    spec:
      serviceAccountName: afp-policy-operator
      containers:
        - name: operator
          image: ghcr.io/filthymudblood/aegis-fabric-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KUBECONFIG
              value: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: afp-policy-operator
  namespace: afp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: afp-policy-operator
rules:
  - apiGroups: ["afp.aegis-fabric.io"]
    resources: ["afpclusterpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: afp-policy-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: afp-policy-operator
subjects:
  - kind: ServiceAccount
    name: afp-policy-operator
    namespace: afp-system

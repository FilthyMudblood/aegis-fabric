apiVersion: v1
kind: ConfigMap
metadata:
  name: afp-agent-config
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: agent-sdk
data:
  AFP_SDK_FAIL_MODE: "closed"
  AFP_IPC_SOCKET: "/var/run/afp/agent.sock"
  AFP_SDK_RPC_TIMEOUT_MS: "50"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: afp-sidecar-config
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: sidecar
data:
  AFP_RUN_MODE: "enterprise-mesh"
  AFP_IPC_SOCKET: "/var/run/afp/agent.sock"
  AFP_ENTROPY_LIMIT: "0.95"
  AFP_MAX_CONTEXT_BYTES: "536870912"
  AFP_INGRESS_ADDR: ":8080"
  AFP_EGRESS_ADDR: "127.0.0.1:8081"
  AFP_METRICS_ADDR: "0.0.0.0:9090"
  AFP_LOCAL_DID: "did:afp:agent:enterprise-alpha"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: afp-sidecar-bootstrap
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: sidecar
data:
  bootstrap.json: |
    {
      "seed_nodes": [
        {
          "peer_id": "did:afp:seed:alpha",
          "endpoint": "afp-mesh-ingress.afp-system.svc.cluster.local:8080",
          "cvp": 0.95
        },
        {
          "peer_id": "did:afp:seed:beta",
          "endpoint": "afp-mesh-ingress.afp-system.svc.cluster.local:8080",
          "cvp": 0.90
        }
      ]
    }

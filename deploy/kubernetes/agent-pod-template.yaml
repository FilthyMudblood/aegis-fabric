  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-fabric
      app.kubernetes.io/component: agent-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-fabric
        app.kubernetes.io/component: agent-node
        afp.mesh/role: enterprise-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"

apiVersion: v1
kind: Service
metadata:
  name: afp-policy-controller
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller
spec:
  selector:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller
  ports:
    - name: grpc
      port: 8090
      targetPort: 8090

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: afp-policy-controller
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: afp-policy-controller
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: afp-policy-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: afp-policy-controller
subjects:
  - kind: ServiceAccount
    name: afp-policy-controller
    namespace: afp-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afp-policy-controller
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-fabric
      app.kubernetes.io/component: policy-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-fabric
        app.kubernetes.io/component: policy-controller
    spec:
      serviceAccountName: afp-policy-controller
      containers:
        - name: policy-controller
          image: ghcr.io/filthymudblood/aegis-fabric-sidecar:latest
          imagePullPolicy: IfNotPresent
          command: ["policy-controller"]
          env:
            - name: AFP_POLICY_CONTROLLER_ADDR
              value: ":8090"
            - name: AFP_POLICY_AUTH_ENABLED
              value: "true"
            - name: AFP_ALLOWED_NAMESPACE
              value: afp-system
            - name: AFP_PUBLISHER_SERVICE_ACCOUNT
              value: system:serviceaccount:afp-system:afp-policy-operator
            - name: AFP_POLICY_TLS_ENABLED
              value: "true"
          ports:
            - name: grpc
              containerPort: 8090
          volumeMounts:
            - name: afp-policy-tls
              mountPath: /etc/afp/tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: afp-policy-tls
          secret:
            secretName: afp-policy-tls
            items:
              - key: server.crt
                path: tls.crt
              - key: server.key
                path: tls.key
              - key: ca.crt
                path: ca.crt

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: afp-sidecar-agent
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: agent-node

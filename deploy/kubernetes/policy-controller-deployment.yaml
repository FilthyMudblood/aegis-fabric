apiVersion: v1
kind: Service
metadata:
  name: afp-policy-controller
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller
spec:
  selector:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller
  ports:
    - name: grpc
      port: 8090
      targetPort: 8090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afp-policy-controller
  namespace: afp-system
  labels:
    app.kubernetes.io/name: aegis-fabric
    app.kubernetes.io/component: policy-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-fabric
      app.kubernetes.io/component: policy-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-fabric
        app.kubernetes.io/component: policy-controller
    spec:
      containers:
        - name: policy-controller
          image: ghcr.io/filthymudblood/aegis-fabric-sidecar:latest
          imagePullPolicy: IfNotPresent
          command: ["policy-controller"]
          env:
            - name: AFP_POLICY_CONTROLLER_ADDR
              value: ":8090"
          ports:
            - name: grpc
              containerPort: 8090
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
